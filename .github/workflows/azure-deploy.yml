name: Deploy — Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  APP_NAME: 'wa-gs1-2026-spacial-project'
  RESOURCE_GROUP: 'rg-gs1-2026'

jobs:
  # ─── JOB 1: Build ────────────────────────────────────────────────────────────
  build:
    name: Build Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/devops-landing-page/browser
          retention-days: 1

  # ─── JOB 2: Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://spacial-project-boayd2bphngva7f5.eastus-01.azurewebsites.net

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: ./dist

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          package: ./dist

      # Necessário para App Services do tipo Container:
      # o container precisa ser reiniciado para servir os novos arquivos
      - name: Restart App Service
        run: |
          az webapp restart \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Aguardar App Service reiniciar
        run: sleep 20

      - name: Verificar status do App Service
        run: |
          STATE=$(az webapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "state" -o tsv)
          echo "App Service state: $STATE"
          if [ "$STATE" != "Running" ]; then
            echo "App Service não está Running!" && exit 1
          fi

      - name: Logout do Azure
        if: always()
        run: az logout
